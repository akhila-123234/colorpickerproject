<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>
    <div class="d-flex flex-column justify-content-center text-center" id="colorPickerContainer">

        <h1 class="main_heading">Color Picker</h1>

        <div>
            <button class="button button_1" onclick="changeBgToGreyAndUpdateText()">#e0e0e0</button>
            <button class="button button_2" onclick="changeBgToGreenAndUpdateText()">#6fcf97</button>
            <button class="button button_3" onclick="changeBgToBlueAndUpdateText()">#56ccf2</button>
            <button class="button button_4" onclick="changeBgToPurpleAndUpdateText()">#bb6bd9</button>
        </div>

        <p class="para1">
            Background Color :
            <span id="selectedColorHexCode">#fffff</span>
        </p>

        <p class="para2">
            Try clicking on one of the colors above to change the background color of this page!
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
